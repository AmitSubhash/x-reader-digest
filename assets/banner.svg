<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0e16"/>
      <stop offset="1" stop-color="#161d33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6ea8fe"/>
      <stop offset="1" stop-color="#b18cff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .pulse{animation:pulse 2.8s ease-in-out infinite;}
      @keyframes pulse{0%,100%{opacity:.8;}50%{opacity:1;}}
    </style>
  </defs>

  <rect width="1200" height="340" rx="20" fill="url(#bg)"/>

  <!-- wordmark + tagline (always visible) -->
  <text x="70" y="150" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="56" font-weight="700" fill="#eef2fb">x-reader-digest</text>
  <rect x="72" y="170" width="250" height="5" rx="2.5" fill="url(#accent)"/>
  <text x="74" y="212" font-size="24" fill="#aeb8d0">Your X reposts, read calmly every morning.</text>
  <text x="74" y="248" font-size="17" fill="#7f8aa6">Articles in full. Videos triaged. Claims explained. Ranked by your taste.</text>

  <!-- animation: scattered reposts flow into one digest -->
  <g transform="translate(820,170)">
    <g class="pulse" filter="url(#glow)">
      <rect x="150" y="-58" width="150" height="116" rx="14" fill="#141d36" stroke="url(#accent)" stroke-width="2"/>
      <rect x="170" y="-34" width="110" height="9" rx="4.5" fill="#6ea8fe"/>
      <rect x="170" y="-15" width="92" height="7" rx="3.5" fill="#4a5a86"/>
      <rect x="170" y="-1" width="110" height="7" rx="3.5" fill="#3b496e"/>
      <rect x="170" y="13" width="78" height="7" rx="3.5" fill="#3b496e"/>
      <rect x="170" y="27" width="100" height="7" rx="3.5" fill="#3b496e"/>
    </g>

    <!-- source posts (always visible) -->
    <g fill="#243152" stroke="#33406a" stroke-width="1.5">
      <rect x="-150" y="-104" width="62" height="40" rx="7"/>
      <rect x="-176" y="-20" width="62" height="40" rx="7"/>
      <rect x="-150" y="64" width="62" height="40" rx="7"/>
    </g>

    <!-- traveling dots (SMIL: animate in browsers, harmless if static) -->
    <g fill="url(#accent)">
      <circle r="6"><animateMotion dur="3.2s" repeatCount="indefinite" path="M -120 -84 C -40 -84 60 -45 150 0"/></circle>
      <circle r="6"><animateMotion dur="3.2s" begin="0.8s" repeatCount="indefinite" path="M -146 0 C -56 0 60 0 150 0"/></circle>
      <circle r="6"><animateMotion dur="3.2s" begin="1.6s" repeatCount="indefinite" path="M -120 84 C -40 84 60 45 150 0"/></circle>
      <circle r="6"><animateMotion dur="3.2s" begin="2.4s" repeatCount="indefinite" path="M -146 -42 C -50 -42 60 -22 150 0"/></circle>
    </g>
  </g>
</svg>
